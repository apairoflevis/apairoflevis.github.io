<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="APairOfLevis95 — a Win95 vaporwave portfolio by Andrew De La Paz.">
    <link rel="icon" href="img/calming_icons_32x32/this_computer.png" type="image/png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tinos&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/main.css">
    <title>APairOfLevis95</title>
</head>

<body>

    <main class="desktop">
        <div class="desktop-icons">
            <a href="about.html" class="desktop-icon">
                <img src="img/calming_icons_32x32/contact_book.png" alt="About Me">
                <span>About Me</span>
            </a>
            <a href="projects.html" class="desktop-icon">
                <img src="img/calming_icons_32x32/folder_closed.png" alt="Projects">
                <span>Projects</span>
            </a>
            <a href="https://www.youtube.com/watch?v=8GW6sLrK40k" target="_blank" rel="noopener noreferrer" class="desktop-icon">
                <img src="img/calming_icons_32x32/music.png" alt="Nostalgia">
                <span>Nostalgia</span>
            </a>
            <a href="https://github.com/apairoflevis" target="_blank" rel="noopener noreferrer" class="desktop-icon">
                <img src="img/calming_icons_32x32/github.png" alt="GitHub">
                <span>GitHub</span>
            </a>
        </div>
        <div class="hero">
            <div class="hero-bg"></div>
        </div>
        <div class="brand-lockup">
            <img class="brand-logo" src="img/pngegg.png" alt="Windows 95">
            <div class="brand-text">
                <span class="brand-top neon-cyan">APairOf</span>
                <span class="brand-bottom neon-pink">Levis95</span>
            </div>
        </div>
    </main>

    <div class="taskbar" id="taskbar"></div>

    <script src="js/main.js" defer></script>
</body>

</html>
